name: 政策雷达 · 每日采集

on:
  # schedule:  # 已停用定时运行，需要时取消注释
  #   # 北京时间每天早上 8:00 (UTC+8 → UTC 0:00)
  #   - cron: "0 0 * * *"
  workflow_dispatch:  # 允许手动触发

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install -r requirements.txt

      - name: 运行政策雷达
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python main.py --now

      - name: 提交报告
        run: |
          git config user.name "Policy Radar Bot"
          git config user.email "bot@policy-radar.local"
          git add reports/ data/
          git diff --staged --quiet || git commit -m "📡 日报 $(date +%Y-%m-%d) [auto]"
          git push
