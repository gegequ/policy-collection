deepseek:
  api_key: ${DEEPSEEK_API_KEY}
  model: deepseek-chat
  max_tokens: 8000
  base_url: https://api.deepseek.com

sources:
  货币政策: true
  宏观决策: true
  产业政策: true
  金融监管: true
  经济数据: true
  贸易数据: true
  能源政策: true
  财政商务: true
  政策研究: true
  媒体舆论: true
  医药卫生: true
  财经媒体: true
  新闻联播: true

database:
  path: "./data/policy_radar.db"

output:
  report_dir: "./reports"
  keep_days: 365

fetch:
  timeout_sec: 30
  max_concurrent: 5
