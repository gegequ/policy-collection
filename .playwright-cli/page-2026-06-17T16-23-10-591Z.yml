              - link "趋势领涨 2026-06-17 21:15:13 美国太空探索技术公司的货运“龙”飞船携带大量科研物资和设备返回地球，17日溅落在美加利福尼亚州附近海域。据美国航空航天局介绍，“龙”飞船于美国东部时间16日12时25分许（北京时间17日0时25分许）脱离国际空间站，启程返回地球。“龙”飞船于美国西部时间17日5时11分许（北京时间17日20时11分许），溅落在加利福尼亚州附近海域。美航空航天局表示，“龙”飞船带回的科研物资包括生物打印的器官和软骨组织，有关改进未来太空任务低温燃料储存技术的数据，以及用于开发新型癌症疗法的DNA仿生材料。返航携带的设备还包括监测宇航员眼部健康的眼部成像设备，过滤舱内微量污染物的空气净化装置，以及处理废弃物与卫生用品的分离泵。" [ref=e871] [cursor=pointer]:
